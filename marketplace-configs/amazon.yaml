# ──────────────────────────────────────────────────────────────────────────────
# Amazon Turkey SP-API Adapter Konfigürasyonu
# Auth: OAuth2 Bearer (LWA — Login With Amazon)
#       Token ~1 saatte yenilenir, AmazonTokenProvider otomatik yönetir.
# ──────────────────────────────────────────────────────────────────────────────

marketplace: AMAZON_TR
baseUrl: https://sellingpartnerapi-eu.amazon.com
timeoutSeconds: 45
maxRetries: 3

rateLimit:
  permitsPerSecond: 5
  maxBurst: 10

credentials:
  accessToken:  "ACCESS_TOKEN_BURAYA"
  refreshToken: "REFRESH_TOKEN_BURAYA"
  apiKey:       "LWA_CLIENT_ID_BURAYA"
  apiSecret:    "LWA_CLIENT_SECRET_BURAYA"

extra:
  marketplaceId: "A33AVAJ2PDY3EV"   # Amazon Turkey marketplace ID
  sellerId:      "SELLER_ID_BURAYA"

operations:

  getOrders:
    method: GET
    path: /orders/v0/orders
    queryParams:
      - name: MarketplaceIds
        type: STRING
        required: true
        defaultValue: "A33AVAJ2PDY3EV"
      - name: CreatedAfter
        type: STRING
        required: false
      - name: OrderStatuses
        type: STRING
        required: false
      - name: NextToken
        type: STRING
        required: false
    responseMapping:
      orderList:   "$.payload.Orders[*]"
      nextToken:   "$.payload.NextToken"
      orderId:     "$.AmazonOrderId"
      orderStatus: "$.OrderStatus"
      totalAmount: "$.OrderTotal.Amount"
      orderDate:   "$.PurchaseDate"

  getOrderDetail:
    method: GET
    path: /orders/v0/orders/{orderId}
    responseMapping:
      orderId:     "$.payload.AmazonOrderId"
      orderStatus: "$.payload.OrderStatus"
      buyerEmail:  "$.payload.BuyerInfo.BuyerEmail"

  getProducts:
    method: GET
    path: /catalog/2022-04-01/items
    queryParams:
      - name: marketplaceIds
        type: STRING
        required: true
        defaultValue: "A33AVAJ2PDY3EV"
      - name: keywords
        type: STRING
        required: false
    responseMapping:
      products:  "$.items[*]"
      productId: "$.asin"
      title:     "$.summaries[0].itemName"

  createProduct:
    method: PUT
    path: /listings/2021-08-01/items/{sellerId}/{stockCode}
    queryParams:
      - name: marketplaceIds
        type: STRING
        required: true
        defaultValue: "A33AVAJ2PDY3EV"
    contentType: application/json
    requestTemplate: |
      {
        "productType": "${productType}",
        "attributes": {
          "item_name": [{"value": "${title}", "marketplace_id": "A33AVAJ2PDY3EV"}],
          "list_price": [{"value": ${listPrice}, "currency": "TRY", "marketplace_id": "A33AVAJ2PDY3EV"}],
          "fulfillment_availability": [{"fulfillment_channel_code": "DEFAULT", "quantity": ${quantity}}]
        }
      }
    responseMapping:
      status:        "$.status"
      submissionId:  "$.submissionId"

  updateProduct:
    method: PATCH
    path: /listings/2021-08-01/items/{sellerId}/{stockCode}
    queryParams:
      - name: marketplaceIds
        type: STRING
        required: true
        defaultValue: "A33AVAJ2PDY3EV"
    contentType: application/json
    requestTemplate: |
      {
        "productType": "${productType}",
        "patches": [{
          "op":        "replace",
          "path":      "/attributes/list_price",
          "value":     [{"value": ${salePrice}, "currency": "TRY", "marketplace_id": "A33AVAJ2PDY3EV"}]
        }]
      }
    responseMapping:
      status: "$.status"

  updateStock:
    method: PATCH
    path: /listings/2021-08-01/items/{sellerId}/{stockCode}
    queryParams:
      - name: marketplaceIds
        type: STRING
        required: true
        defaultValue: "A33AVAJ2PDY3EV"
    contentType: application/json
    requestTemplate: |
      {
        "productType": "${productType}",
        "patches": [{
          "op":    "replace",
          "path":  "/attributes/fulfillment_availability",
          "value": [{"fulfillment_channel_code": "DEFAULT", "quantity": ${quantity}}]
        }]
      }
    responseMapping:
      status: "$.status"

  updatePrice:
    method: PATCH
    path: /listings/2021-08-01/items/{sellerId}/{stockCode}
    queryParams:
      - name: marketplaceIds
        type: STRING
        required: true
        defaultValue: "A33AVAJ2PDY3EV"
    contentType: application/json
    requestTemplate: |
      {
        "productType": "${productType}",
        "patches": [{
          "op":    "replace",
          "path":  "/attributes/list_price",
          "value": [{"value": ${listPrice}, "currency": "TRY", "marketplace_id": "A33AVAJ2PDY3EV"}]
        }]
      }
    responseMapping:
      status: "$.status"

  getCategories:
    method: GET
    path: /catalog/2022-04-01/categories
    queryParams:
      - name: marketplaceIds
        type: STRING
        required: true
        defaultValue: "A33AVAJ2PDY3EV"
    cache:
      ttlSeconds: 86400
      maxSize: 10
    responseMapping:
      categories: "$.categories[*]"

  getSettlements:
    method: GET
    path: /finances/v0/financialEvents
    queryParams:
      - name: PostedAfter
        type: STRING
        required: false
      - name: PostedBefore
        type: STRING
        required: false
    responseMapping:
      events: "$.payload.FinancialEvents[*]"
